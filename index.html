<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#cc2233">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="通勤ナビ">
<title>通勤ナビ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#cc2233;--red-light:#f5e0e2;
  --orange:#d4700a;--orange-light:#fef0e0;
  --blue:#1a5fa8;--blue-light:#e0eaf8;
  --purple:#5c3fa0;--purple-light:#ede8f8;
  --gray:#5a5a5a;--gray-light:#f0efeb;
  --green:#1a7a4a;--green-light:#e0f2e9;
  --mai:#c0392b;--mai-light:#fde8e8;
  --r30:#1a5fa8;--r30-light:#e0eaf8;
  --r31:#1a7a4a;--r31-light:#e0f2e9;
  --bg:#f8f7f5;--card:#ffffff;--text:#1a1a1a;--muted:#888;
  --border:#e0ddd8;--radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --tab-h:56px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}

/* ── タブバー ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tab-h) + var(--safe-bot));
  background:var(--card);
  border-top:1px solid var(--border);
  display:flex;
  z-index:200;
  padding-bottom:var(--safe-bot);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:none;font-family:inherit;
  padding:0;color:var(--muted);transition:color .15s;
}
.tab-btn.active-train{color:var(--red)}
.tab-btn.active-bus-go{color:var(--r30)}
.tab-btn.active-bus-back{color:var(--r31)}
.tab-icon{font-size:20px;line-height:1}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.03em}

/* ── ページ ── */
.page{display:none;padding:calc(var(--safe-top) + 1rem) 1rem calc(var(--tab-h) + var(--safe-bot) + 1rem)}
.page.active{display:block}
.inner{max-width:480px;margin:0 auto}

/* ── 共通ヘッダー ── */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem}
.station-label{font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:3px}
.route-row{display:flex;align-items:center;gap:6px}
.sta-main{font-size:22px;font-weight:700;line-height:1}
.sta-arrow{color:var(--muted);font-size:16px}
.sta-sub{font-size:13px;font-weight:600;margin-top:3px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.clock{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.day-pill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;letter-spacing:.04em}
.pill-weekday{background:var(--blue-light);color:var(--blue)}
.pill-weekend{background:var(--green-light);color:var(--green)}
.pill-saturday{background:var(--r31-light);color:var(--r31)}
.pill-holiday{background:var(--orange-light);color:var(--orange)}

/* ── リスト共通 ── */
.item-list{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.item-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);position:relative}
.item-row:last-child{border-bottom:none}
.item-row.is-top{background:#fffcfc}
.item-row.is-top-bus{background:#f8faff}
.item-row.is-past{background:#f6f6f6;opacity:.55}
.top-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.time-col{min-width:54px}
.time-big{font-size:24px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
.is-past .time-big{color:var(--muted)}
.cntdwn{font-size:11px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.cntdwn.soon{color:var(--red);font-weight:600}
.cntdwn.soon-bus{color:var(--mai);font-weight:600}
.cntdwn.gone{color:#bbb}
.badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:5px;white-space:nowrap;min-width:52px;text-align:center}
/* 電車バッジ */
.b-快特{background:var(--red-light);color:var(--red)}
.b-エアポート快特{background:var(--orange-light);color:var(--orange)}
.b-特急{background:var(--orange-light);color:var(--orange)}
.b-急行{background:var(--blue-light);color:var(--blue)}
.b-ウィング{background:var(--purple-light);color:var(--purple)}
.b-普通{background:var(--gray-light);color:var(--gray)}
/* バスバッジ */
.bm{background:var(--mai-light);color:var(--mai)}
.b30{background:var(--r30-light);color:var(--r30)}
.b31{background:var(--r31-light);color:var(--r31)}

.dest-col{flex:1;min-width:0}
.dest{font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.is-past .dest{color:var(--muted)}
.via{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.first-badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:5px;background:var(--green-light);color:var(--green);white-space:nowrap;flex-shrink:0}
.note-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--orange-light);color:var(--orange);margin-top:3px}
.msg{padding:2.5rem;text-align:center;color:var(--muted);font-size:14px;line-height:1.7}

/* ── 電車 方向ボタン ── */
.dir-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.dir-btn{padding:11px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-family:inherit;font-size:14px;color:var(--muted);line-height:1.3;text-align:center;transition:all .15s}
.dir-btn:active{transform:scale(.97)}
.dir-btn.active{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:600}
.dir-btn-sub{font-size:11px;margin-top:2px;opacity:.75}

/* ── バス 曜日ボタン ── */
.day-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.day-btn{padding:11px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-family:inherit;font-size:14px;color:var(--muted);text-align:center;transition:all .15s}
.day-btn:active{transform:scale(.97)}
.day-btn.aw{border-color:var(--r30);background:var(--r30-light);color:var(--r30);font-weight:600}
.day-btn.as{border-color:var(--r31);background:var(--r31-light);color:var(--r31);font-weight:600}
.day-btn.ah{border-color:var(--orange);background:var(--orange-light);color:var(--orange);font-weight:600}

.footer{margin-top:.25rem;text-align:center;font-size:10px;color:var(--muted)}
</style>
</head>
<body>

<!-- ═══ 電車ページ ═══ -->
<div class="page active" id="page-train">
<div class="inner">
  <div class="hdr">
    <div>
      <div class="station-label">京急線 次発案内</div>
      <div class="route-row">
        <span class="sta-main" id="t-from" style="color:var(--text)">品川</span>
        <span class="sta-arrow">→</span>
        <span class="sta-main" id="t-to" style="color:var(--red)">上大岡方面</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="t-clock">--:--</div>
      <div class="day-pill pill-weekday" id="t-pill">平日</div>
    </div>
  </div>
  <div class="item-list" id="train-list"><div class="msg">読み込み中...</div></div>
  <div class="dir-wrap">
    <button class="dir-btn active" id="btn-down" onclick="setDir('down')">← 下り<div class="dir-btn-sub">品川 → 上大岡方面</div></button>
    <button class="dir-btn" id="btn-up" onclick="setDir('up')">上り →<div class="dir-btn-sub">上大岡 → 品川</div></button>
  </div>
  <div class="footer">データ：京急電鉄 2026年版</div>
</div>
</div>

<!-- ═══ バス往きページ ═══ -->
<div class="page" id="page-bus-go">
<div class="inner">
  <div class="hdr">
    <div>
      <div class="station-label">上大岡駅 8番のりば発</div>
      <div class="route-row">
        <span class="sta-main" style="color:var(--text)">上大岡</span>
        <span class="sta-arrow">→</span>
        <span class="sta-main" style="color:var(--r30)">各方面</span>
      </div>
      <div class="sta-sub" style="color:var(--muted);font-weight:500;font-size:13px;margin-top:3px">神奈川中央交通</div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="g-clock">--:--</div>
      <div class="day-pill pill-weekday" id="g-pill">平日</div>
    </div>
  </div>
  <div class="item-list" id="bus-go-list"><div class="msg">読み込み中...</div></div>
  <div class="day-wrap">
    <button class="day-btn" id="g-btn-weekday"  onclick="setBusGoDay('weekday')">平日</button>
    <button class="day-btn" id="g-btn-saturday" onclick="setBusGoDay('saturday')">土曜</button>
    <button class="day-btn" id="g-btn-holiday"  onclick="setBusGoDay('holiday')">日祝</button>
  </div>
  <div class="footer">データ：神奈川中央交通 2025/8/30改正</div>
</div>
</div>

<!-- ═══ バス帰りページ ═══ -->
<div class="page" id="page-bus-back">
<div class="inner">
  <div class="hdr">
    <div>
      <div class="station-label">下車ケ谷 発 → 上大岡駅 行き</div>
      <div class="route-row">
        <span class="sta-main" style="color:var(--text)">下車ケ谷</span>
        <span class="sta-arrow">→</span>
        <span class="sta-main" style="color:var(--r31)">上大岡駅</span>
      </div>
      <div class="sta-sub" style="color:var(--muted);font-weight:500;font-size:13px;margin-top:3px">神奈川中央交通</div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="b-clock">--:--</div>
      <div class="day-pill pill-weekday" id="b-pill">平日</div>
    </div>
  </div>
  <div class="item-list" id="bus-back-list"><div class="msg">読み込み中...</div></div>
  <div class="day-wrap">
    <button class="day-btn" id="b-btn-weekday"  onclick="setBusBackDay('weekday')">平日</button>
    <button class="day-btn" id="b-btn-saturday" onclick="setBusBackDay('saturday')">土曜</button>
    <button class="day-btn" id="b-btn-holiday"  onclick="setBusBackDay('holiday')">日祝</button>
  </div>
  <div class="footer">データ：神奈川中央交通 2025/8/30改正</div>
</div>
</div>

<!-- ═══ タブバー ═══ -->
<nav class="tab-bar">
  <button class="tab-btn active-train" id="tab-train" onclick="showTab('train')">
    <span class="tab-icon">🚃</span>
    <span class="tab-label">京急電車</span>
  </button>
  <button class="tab-btn" id="tab-bus-go" onclick="showTab('bus-go')">
    <span class="tab-icon">🚌</span>
    <span class="tab-label">バス往き</span>
  </button>
  <button class="tab-btn" id="tab-bus-back" onclick="showTab('bus-back')">
    <span class="tab-icon">🏠</span>
    <span class="tab-label">バス帰り</span>
  </button>
</nav>

// ═══════════════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════════════
const pad=n=>String(n).padStart(2,'0');
const nowMin=()=>{const d=new Date();return d.getHours()*60+d.getMinutes();};
const HOLIDAYS=['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23'];
function detectDay(){
  const d=new Date(),dow=d.getDay();
  const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if(HOLIDAYS.includes(ds)||dow===0)return'holiday';
  if(dow===6)return'saturday';
  return'weekday';
}
function isWeekend(d){const w=d.getDay();return w===0||w===6;}

// ═══════════════════════════════════════════════
// 状態
// ═══════════════════════════════════════════════
let currentTab='train';
let trainDir='down';
let busGoDay=detectDay();
let busBackDay=detectDay();

const BLABEL={mai:'舞01',r30:'上30',r31:'上31'};
const BCLS={mai:'bm',r30:'b30',r31:'b31'};
const BCOLOR={mai:'var(--mai)',r30:'var(--r30)',r31:'var(--r31)'};

// ═══════════════════════════════════════════════
// タブ切り替え
// ═══════════════════════════════════════════════
function showTab(tab){
  currentTab=tab;
  ['train','bus-go','bus-back'].forEach(t=>{
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
    const btn=document.getElementById('tab-'+t);
    btn.className='tab-btn';
    if(t===tab){
      if(t==='train')btn.classList.add('active-train');
      else if(t==='bus-go')btn.classList.add('active-bus-go');
      else btn.classList.add('active-bus-back');
    }
  });
}

// ═══════════════════════════════════════════════
// 電車レンダリング
// ═══════════════════════════════════════════════
function badgeCls(t){
  return({'快特':'b-快特','エアポート快特':'b-エアポート快特','特急':'b-特急','急行':'b-急行','ウィング':'b-ウィング'}[t]||'b-普通');
}
function renderTrain(){
  const now=new Date(),nowM=nowMin();
  const wknd=isWeekend(now);
  const key=wknd?'土日祝':'平日';
  const src=trainDir==='down'?TT_DOWN:TT_UP;
  const trains=(src[key]||[]).map(t=>({...t,totalM:(t.h===0?24:t.h)*60+t.m})).filter(t=>t.totalM>=nowM).slice(0,8);
  const el=document.getElementById('train-list');
  // クロック・ピル
  document.getElementById('t-clock').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const pill=document.getElementById('t-pill');
  pill.textContent=wknd?'土日祝':'平日';
  pill.className='day-pill '+(wknd?'pill-weekend':'pill-weekday');
  if(!trains.length){el.innerHTML='<div class="msg">本日の運行は終了しました</div>';return;}
  el.innerHTML=trains.map((t,i)=>{
    const diff=t.totalM-nowM;
    const cd=diff<=0?'まもなく':`あと${diff}分`;
    const cdCls=diff<=3?'soon':'';
    return`<div class="item-row${i===0?' is-top':''}">
    ${i===0?'<div class="top-bar" style="background:var(--red)"></div>':''}
    <div class="time-col"><div class="time-big">${pad(t.h===0?0:t.h)}:${pad(t.m)}</div><div class="cntdwn ${cdCls}">${cd}</div></div>
    <span class="badge ${badgeCls(t.type)}">${t.type}</span>
    <div class="dest-col"><div class="dest">${t.dest}</div>${t.first?'<span class="first-badge">始発</span>':''}</div>
    </div>`;
  }).join('');
}
function setDir(d){
  trainDir=d;
  document.getElementById('btn-down').className='dir-btn'+(d==='down'?' active':'');
  document.getElementById('btn-up').className='dir-btn'+(d==='up'?' active':'');
  document.getElementById('t-from').textContent=d==='down'?'品川':'上大岡';
  document.getElementById('t-to').textContent=d==='down'?'上大岡方面':'品川';
  renderTrain();
}

// ═══════════════════════════════════════════════
// バス共通レンダリング
// ═══════════════════════════════════════════════
function renderBus(data,day,elId,clockId,pillId){
  const now=nowMin();
  const buses=[...data[day]].sort((a,b)=>a.h*60+a.m-(b.h*60+b.m));
  const ni=buses.findIndex(b=>b.h*60+b.m>=now);
  const show=[];
  if(ni===-1){if(buses.length)show.push({...buses[buses.length-1],past:true});}
  else{if(ni>0)show.push({...buses[ni-1],past:true});for(let i=0;i<3&&ni+i<buses.length;i++)show.push({...buses[ni+i],past:false});}
  const el=document.getElementById(elId);
  // クロック
  const d=new Date();
  document.getElementById(clockId).textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if(!show.length){el.innerHTML='<div class="msg">本日の運行はありません</div>';return;}
  const firstFI=show.findIndex(b=>!b.past);
  el.innerHTML=show.map((b,i)=>{
    const ts=`${pad(b.h)}:${pad(b.m)}`;
    const diff=b.h*60+b.m-now;
    const isTop=!b.past&&i===firstFI;
    let cd='';
    if(b.past)cd='<div class="cntdwn gone">発車済み</div>';
    else if(diff===0)cd='<div class="cntdwn soon-bus">まもなく発車</div>';
    else if(diff<=5)cd=`<div class="cntdwn soon-bus">あと ${diff} 分</div>`;
    else cd=`<div class="cntdwn">あと ${diff} 分</div>`;
    const bar=b.past?'#ccc':BCOLOR[b.r];
    const rc=b.past?'item-row is-past':(isTop?'item-row is-top-bus':'item-row');
    const note=b.note?`<span class="note-tag">${b.note}</span>`:'';
    return`<div class="${rc}">
    <div class="top-bar" style="background:${bar}"></div>
    <div class="time-col"><div class="time-big">${ts}</div>${cd}</div>
    <span class="badge ${BCLS[b.r]}">${BLABEL[b.r]}</span>
    <div class="dest-col"><div class="dest">${b.dest}</div><div class="via">${b.via}</div>${note}</div>
    </div>`;
  }).join('');
}

// ── バス往き曜日 ──
function setBusGoDay(day){
  busGoDay=day;
  const ac={weekday:'aw',saturday:'as',holiday:'ah'};
  ['weekday','saturday','holiday'].forEach(d=>{
    document.getElementById('g-btn-'+d).className='day-btn'+(d===day?' '+ac[d]:'');
  });
  const pc={weekday:'day-pill pill-weekday',saturday:'day-pill pill-saturday',holiday:'day-pill pill-holiday'};
  const pt={weekday:'平日',saturday:'土曜',holiday:'日祝'};
  const p=document.getElementById('g-pill');p.className=pc[day];p.textContent=pt[day];
  renderBus(BUS_GO,day,'bus-go-list','g-clock','g-pill');
}
// ── バス帰り曜日 ──
function setBusBackDay(day){
  busBackDay=day;
  const ac={weekday:'aw',saturday:'as',holiday:'ah'};
  ['weekday','saturday','holiday'].forEach(d=>{
    document.getElementById('b-btn-'+d).className='day-btn'+(d===day?' '+ac[d]:'');
  });
  const pc={weekday:'day-pill pill-weekday',saturday:'day-pill pill-saturday',holiday:'day-pill pill-holiday'};
  const pt={weekday:'平日',saturday:'土曜',holiday:'日祝'};
  const p=document.getElementById('b-pill');p.className=pc[day];p.textContent=pt[day];
  renderBus(BUS_BACK,day,'bus-back-list','b-clock','b-pill');
}

// ═══════════════════════════════════════════════
// 初期化 & 定期更新
// ═══════════════════════════════════════════════
function renderAll(){
  renderTrain();
  renderBus(BUS_GO,busGoDay,'bus-go-list','g-clock','g-pill');
  renderBus(BUS_BACK,busBackDay,'bus-back-list','b-clock','b-pill');
}
// 初期ボタン状態
(function init(){
  const day=detectDay();
  busGoDay=day;busBackDay=day;
  setBusGoDay(day);
  setBusBackDay(day);
  setDir('down');
  renderAll();
  const tick=()=>{renderAll();setTimeout(tick,60000-Date.now()%60000);};
  setTimeout(tick,60000-Date.now()%60000);
})();
</script>
