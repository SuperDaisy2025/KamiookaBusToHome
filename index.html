<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#cc2233">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="通勤ナビ">
<title>通勤ナビ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#cc2233;--red-light:#f5e0e2;
  --orange:#d4700a;--orange-light:#fef0e0;
  --blue:#1a5fa8;--blue-light:#e0eaf8;
  --purple:#5c3fa0;--purple-light:#ede8f8;
  --gray:#5a5a5a;--gray-light:#f0efeb;
  --green:#1a7a4a;--green-light:#e0f2e9;
  --mai:#c0392b;--mai-light:#fde8e8;
  --r30:#1a5fa8;--r30-light:#e0eaf8;
  --r31:#1a7a4a;--r31-light:#e0f2e9;
  --bg:#f8f7f5;--card:#ffffff;--text:#1a1a1a;--muted:#888;
  --border:#e0ddd8;--radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --tab-h:58px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}

/* ── タブバー（4つ） ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tab-h) + var(--safe-bot));
  background:var(--card);border-top:1px solid var(--border);
  display:flex;z-index:200;padding-bottom:var(--safe-bot);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;background:none;font-family:inherit;
  padding:0 2px;color:var(--muted);transition:color .15s;
}
.tab-btn.act-down{color:var(--red)}
.tab-btn.act-up{color:var(--orange)}
.tab-btn.act-go{color:var(--r30)}
.tab-btn.act-back{color:var(--r31)}
.tab-icon{font-size:18px;line-height:1}
.tab-label{font-size:9px;font-weight:600;letter-spacing:.02em;text-align:center;line-height:1.2}

/* ── ページ ── */
.page{display:none;padding:calc(var(--safe-top) + 1rem) 1rem calc(var(--tab-h) + var(--safe-bot) + 1.2rem)}
.page.active{display:block}
.inner{max-width:480px;margin:0 auto}

/* ── ヘッダー ── */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.1rem}
.hdr-left{}
.station-label{font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:2px}
.route-row{display:flex;align-items:center;gap:6px}
.sta-main{font-size:21px;font-weight:700;line-height:1}
.sta-arrow{color:var(--muted);font-size:15px}
.sta-sub{font-size:12px;font-weight:500;color:var(--muted);margin-top:3px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px}
.clock{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.date-line{font-size:11px;color:var(--muted);text-align:right;margin-top:1px}
.day-pill{font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;letter-spacing:.04em}
.pill-weekday{background:var(--blue-light);color:var(--blue)}
.pill-saturday{background:var(--r31-light);color:var(--r31)}
.pill-holiday{background:var(--orange-light);color:var(--orange)}

/* ── リスト ── */
.item-list{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:.9rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.item-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);position:relative}
.item-row:last-child{border-bottom:none}
.item-row.is-next{background:#fffcfc}
.item-row.is-next-bus{background:#f8faff}
.item-row.is-past{background:#f6f6f6;opacity:.52}
.top-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.time-col{min-width:52px}
.time-big{font-size:23px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
.is-past .time-big{color:var(--muted)}
.cntdwn{font-size:11px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.soon-red{color:var(--red);font-weight:600}
.soon-bus{color:var(--mai);font-weight:600}
.gone{color:#bbb}
/* 電車バッジ */
.badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:5px;white-space:nowrap;min-width:50px;text-align:center}
.b-快特{background:var(--red-light);color:var(--red)}
.b-エアポート快特{background:var(--orange-light);color:var(--orange)}
.b-特急{background:var(--orange-light);color:var(--orange)}
.b-急行{background:var(--blue-light);color:var(--blue)}
.b-ウィング{background:var(--purple-light);color:var(--purple)}
.b-普通{background:var(--gray-light);color:var(--gray)}
/* バスバッジ */
.bm{background:var(--mai-light);color:var(--mai)}
.b30{background:var(--r30-light);color:var(--r30)}
.b31{background:var(--r31-light);color:var(--r31)}

.dest-col{flex:1;min-width:0}
.dest{font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.is-past .dest{color:var(--muted)}
.via{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.first-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--green-light);color:var(--green);white-space:nowrap;flex-shrink:0}
.note-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;background:var(--orange-light);color:var(--orange);margin-top:2px}
.msg{padding:2rem;text-align:center;color:var(--muted);font-size:14px;line-height:1.7}

/* ── 曜日ボタン ── */
.day-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:.9rem}
.day-btn{padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-family:inherit;font-size:14px;color:var(--muted);text-align:center;transition:all .15s}
.day-btn:active{transform:scale(.97)}
.day-btn.aw{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:600}
.day-btn.as{border-color:var(--r31);background:var(--r31-light);color:var(--r31);font-weight:600}
.day-btn.ah{border-color:var(--orange);background:var(--orange-light);color:var(--orange);font-weight:600}
/* 電車用（赤系） */
.day-btn.aw-r{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:600}

.footer{margin-top:.2rem;text-align:center;font-size:10px;color:var(--muted)}
</style>
</head>
<body>

<!-- ═══ 電車・下り ═══ -->
<div class="page active" id="page-down">
<div class="inner">
  <div class="hdr">
    <div class="hdr-left">
      <div class="station-label">京急線 下り</div>
      <div class="route-row">
        <span class="sta-main" style="color:var(--text)">品川</span>
        <span class="sta-arrow">→</span>
        <span class="sta-main" style="color:var(--red)">上大岡方面</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="d-clock">--:--</div>
      <div class="date-line" id="d-date">--</div>
      <div class="day-pill pill-weekday" id="d-pill">平日</div>
    </div>
  </div>
  <div class="item-list" id="train-down-list"><div class="msg">読み込み中...</div></div>
  <div class="day-wrap">
    <button class="day-btn" id="d-btn-weekday" onclick="setTrainDay('down','weekday')">平日</button>
    <button class="day-btn" id="d-btn-saturday" onclick="setTrainDay('down','saturday')">土曜</button>
    <button class="day-btn" id="d-btn-holiday" onclick="setTrainDay('down','holiday')">日祝</button>
  </div>
  <div class="footer">データ：京急電鉄 2026年版</div>
</div>
</div>

<!-- ═══ 電車・上り ═══ -->
<div class="page" id="page-up">
<div class="inner">
  <div class="hdr">
    <div class="hdr-left">
      <div class="station-label">京急線 上り</div>
      <div class="route-row">
        <span class="sta-main" style="color:var(--text)">上大岡</span>
        <span class="sta-arrow">→</span>
        <span class="sta-main" style="color:var(--orange)">品川</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="u-clock">--:--</div>
      <div class="date-line" id="u-date">--</div>
      <div class="day-pill pill-weekday" id="u-pill">平日</div>
    </div>
  </div>
  <div class="item-list" id="train-up-list"><div class="msg">読み込み中...</div></div>
  <div class="day-wrap">
    <button class="day-btn" id="u-btn-weekday" onclick="setTrainDay('up','weekday')">平日</button>
    <button class="day-btn" id="u-btn-saturday" onclick="setTrainDay('up','saturday')">土曜</button>
    <button class="day-btn" id="u-btn-holiday" onclick="setTrainDay('up','holiday')">日祝</button>
  </div>
  <div class="footer">データ：京急電鉄 2026年版</div>
</div>
</div>

<!-- ═══ バス往き ═══ -->
<div class="page" id="page-go">
<div class="inner">
  <div class="hdr">
    <div class="hdr-left">
      <div class="station-label">下車ケ谷 → 上大岡駅</div>
      <div class="route-row">
        <span class="sta-main" style="color:var(--text)">下車ケ谷</span>
        <span class="sta-arrow">→</span>
        <span class="sta-main" style="color:var(--r31)">上大岡駅</span>
      </div>
      <div class="sta-sub">神奈川中央交通</div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="g-clock">--:--</div>
      <div class="date-line" id="g-date">--</div>
      <div class="day-pill pill-weekday" id="g-pill">平日</div>
    </div>
  </div>
  <div class="item-list" id="bus-go-list"><div class="msg">読み込み中...</div></div>
  <div class="day-wrap">
    <button class="day-btn" id="g-btn-weekday" onclick="setBusDay('go','weekday')">平日</button>
    <button class="day-btn" id="g-btn-saturday" onclick="setBusDay('go','saturday')">土曜</button>
    <button class="day-btn" id="g-btn-holiday" onclick="setBusDay('go','holiday')">日祝</button>
  </div>
  <div class="footer">データ：神奈川中央交通 2025/8/30改正</div>
</div>
</div>

<!-- ═══ バス帰り ═══ -->
<div class="page" id="page-back">
<div class="inner">
  <div class="hdr">
    <div class="hdr-left">
      <div class="station-label">上大岡駅 8番のりば発</div>
      <div class="route-row">
        <span class="sta-main" style="color:var(--text)">上大岡</span>
        <span class="sta-arrow">→</span>
        <span class="sta-main" style="color:var(--r30)">各方面</span>
      </div>
      <div class="sta-sub">神奈川中央交通</div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="b-clock">--:--</div>
      <div class="date-line" id="b-date">--</div>
      <div class="day-pill pill-weekday" id="b-pill">平日</div>
    </div>
  </div>
  <div class="item-list" id="bus-back-list"><div class="msg">読み込み中...</div></div>
  <div class="day-wrap">
    <button class="day-btn" id="b-btn-weekday" onclick="setBusDay('back','weekday')">平日</button>
    <button class="day-btn" id="b-btn-saturday" onclick="setBusDay('back','saturday')">土曜</button>

  </div>
  <div class="footer">データ：神奈川中央交通 2025/8/30改正</div>
</div>
</div>

<!-- ═══ タブバー（4つ） ═══ -->
<nav class="tab-bar">
  <button class="tab-btn act-down" id="tab-down" onclick="showTab('down')">
    <span class="tab-icon">🚃</span>
    <span class="tab-label">電車<br>下り</span>
  </button>

  <button class="tab-btn" id="tab-go" onclick="showTab('go')">

  <button class="tab-btn" id="tab-back" onclick="showTab('back')">
    <span class="tab-icon">🏠</span>
    <span class="tab-label">バス<br>帰り</span>
  </button>
</nav>

// ═══════════════════════════════════════════════

  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05',

  '2026-10-12','2026-11-03','2026-11-23',
]);

const DOW_JA = ['日','月','火','水','木','金','土'];

function pad(n){ return String(n).padStart(2,'0'); }
function nowMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }

function dateStr(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function detectDay(d){
  d = d||new Date();
  const dow = d.getDay();
  const ds = dateStr(d);
  if(HOLIDAYS.has(ds) || dow===0) return 'holiday';
  if(dow===6) return 'saturday';
  return 'weekday';
}

function dayLabel(day){ return {weekday:'平日',saturday:'土曜',holiday:'日祝'}[day]; }
function pillClass(day){ return {weekday:'day-pill pill-weekday',saturday:'day-pill pill-saturday',holiday:'day-pill pill-holiday'}[day]; }

// 今日の日付文字列（ヘッダー表示用）
function todayLine(){
  const d = new Date();
  const dow = DOW_JA[d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${dow})`;
}

// ═══════════════════════════════════════════════
// 状態
// ═══════════════════════════════════════════════
let currentTab = 'down';
const today = detectDay();

// ═══════════════════════════════════════════════
// タブ切り替え
// ═══════════════════════════════════════════════
const TAB_ACT = {down:'act-down', up:'act-up', go:'act-go', back:'act-back'};
const PAGE_MAP = {down:'page-down', up:'page-up', go:'page-go', back:'page-back'};

function showTab(tab){
  currentTab = tab;
  ['down','up','go','back'].forEach(t=>{
    document.getElementById('page-'+{down:'down',up:'up',go:'go',back:'back'}[t]).classList.toggle('active', t===tab);
    const btn = document.getElementById('tab-'+t);
    btn.className = 'tab-btn' + (t===tab ? ' '+TAB_ACT[t] : '');
  });
}

// ═══════════════════════════════════════════════
// 電車キーマッピング（weekday→平日, saturday/holiday→土日祝）
// ═══════════════════════════════════════════════
function trainKey(day){ return day==='weekday'?'平日':'土日祝'; }

// ═══════════════════════════════════════════════
// 電車レンダリング（発車済み1件グレー＋次7件）
// ═══════════════════════════════════════════════
function badgeCls(t){
  return({'快特':'b-快特','エアポート快特':'b-エアポート快特','特急':'b-特急','急行':'b-急行','ウィング':'b-ウィング'}[t]||'b-普通');
}

function renderTrain(dir, day){
  const now = nowMin();
  const src = dir==='down' ? TT_DOWN : TT_UP;
  const key = trainKey(day);
  const all = (src[key]||[]).map(t=>({...t, totalM:(t.h===0?24:t.h)*60+t.m}));
  all.sort((a,b)=>a.totalM-b.totalM);

  const ni = all.findIndex(t=>t.totalM>=now);
  const show = [];
  if(ni===-1){
    if(all.length) show.push({...all[all.length-1], past:true});
  } else {
    if(ni>0) show.push({...all[ni-1], past:true});
    for(let i=0;i<7&&ni+i<all.length;i++) show.push({...all[ni+i], past:false});
  }

  const pfx = dir==='down'?'d':'u';
  const el = document.getElementById('train-'+dir+'-list');
  const d = new Date();
  document.getElementById(pfx+'-clock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById(pfx+'-date').textContent=todayLine();
  const pill=document.getElementById(pfx+'-pill');
  pill.className=pillClass(day); pill.textContent=dayLabel(day);

  if(!show.length){el.innerHTML='<div class="msg">本日の運行は終了しました</div>';return;}

  const barColor = dir==='down'?'var(--red)':'var(--orange)';
  const firstFI = show.findIndex(b=>!b.past);
  el.innerHTML = show.map((t,i)=>{
    const diff = t.totalM - now;
    let cd = '';
    if(t.past) cd='<div class="cntdwn gone">発車済み</div>';
    else if(diff<=0) cd='<div class="cntdwn soon-red">まもなく発車</div>';
    else if(diff<=3) cd=`<div class="cntdwn soon-red">あと ${diff} 分</div>`;
    else cd=`<div class="cntdwn">あと ${diff} 分</div>`;
    const isNext = !t.past && i===firstFI;
    const rc = t.past?'item-row is-past':(isNext?'item-row is-next':'item-row');
    const bar = t.past?'#ccc':barColor;
    return`<div class="${rc}">
<div class="top-bar" style="background:${bar}"></div>
<div class="time-col"><div class="time-big">${pad(t.h===0?0:t.h)}:${pad(t.m)}</div>${cd}</div>
<span class="badge ${badgeCls(t.type)}">${t.type}</span>
<div class="dest-col"><div class="dest">${t.dest}</div>${t.first&&!t.past?'<span class="first-badge">始発</span>':''}</div>
</div>`;
  }).join('');
}

// ── 電車曜日セット ──
const trainDayState = {down: today, up: today};
function setTrainDay(dir, day){
  trainDayState[dir]=day;
  const pfx=dir==='down'?'d':'u';
  const ac={weekday:'aw-r',saturday:'as',holiday:'ah'};
  ['weekday','saturday','holiday'].forEach(d=>{
    document.getElementById(pfx+'-btn-'+d).className='day-btn'+(d===day?' '+ac[d]:'');
  });
  renderTrain(dir, day);
}

// バスレンダリング（発車済み1件グレー＋次7件）
// ═══════════════════════════════════════════════
const BLABEL={mai:'舞01',r30:'上30',r31:'上31'};
const BCLS={mai:'bm',r30:'b30',r31:'b31'};
const BCOLOR={mai:'var(--mai)',r30:'var(--r30)',r31:'var(--r31)'};

function renderBus(side, day){
  const data = side==='go' ? BUS_BACK : BUS_GO;
  const now = nowMin();
  const buses = [...data[day]].sort((a,b)=>a.h*60+a.m-(b.h*60+b.m));
  const ni = buses.findIndex(b=>b.h*60+b.m>=now);
  const show = [];
  if(ni===-1){
    if(buses.length) show.push({...buses[buses.length-1], past:true});
  } else {
    if(ni>0) show.push({...buses[ni-1], past:true});
    for(let i=0;i<7&&ni+i<buses.length;i++) show.push({...buses[ni+i], past:false});
  }

  const pfx = side==='go'?'g':'b';
  const el = document.getElementById('bus-'+side+'-list');
  const d = new Date();
  document.getElementById(pfx+'-clock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById(pfx+'-date').textContent=todayLine();
  const pill=document.getElementById(pfx+'-pill');
  pill.className=pillClass(day); pill.textContent=dayLabel(day);

  if(!show.length){el.innerHTML='<div class="msg">本日の運行はありません</div>';return;}
  const firstFI=show.findIndex(b=>!b.past);
  el.innerHTML=show.map((b,i)=>{
    const ts=`${pad(b.h)}:${pad(b.m)}`;
    const diff=b.h*60+b.m-now;
    const isTop=!b.past&&i===firstFI;
    let cd='';
    if(b.past) cd='<div class="cntdwn gone">発車済み</div>';
    else if(diff===0) cd='<div class="cntdwn soon-bus">まもなく発車</div>';
    else if(diff<=5) cd=`<div class="cntdwn soon-bus">あと ${diff} 分</div>`;
    else cd=`<div class="cntdwn">あと ${diff} 分</div>`;
    const bar=b.past?'#ccc':BCOLOR[b.r];
    const rc=b.past?'item-row is-past':(isTop?'item-row is-next-bus':'item-row');
    const note=b.note?`<span class="note-tag">${b.note}</span>`:'';
    return`<div class="${rc}">
<div class="top-bar" style="background:${bar}"></div>
<div class="time-col"><div class="time-big">${ts}</div>${cd}</div>
<span class="badge ${BCLS[b.r]}">${BLABEL[b.r]}</span>
<div class="dest-col"><div class="dest">${b.dest}</div><div class="via">${b.via}</div>${note}</div>
</div>`;
  }).join('');
}

// ── バス曜日セット ──
const busDayState = {go: today, back: today};
function setBusDay(side, day){
  busDayState[side]=day;
  const pfx=side==='go'?'g':'b';
  const ac={weekday:'aw',saturday:'as',holiday:'ah'};
  ['weekday','saturday','holiday'].forEach(d=>{
    document.getElementById(pfx+'-btn-'+d).className='day-btn'+(d===day?' '+ac[d]:'');
  });
  renderBus(side, day);
}

// ═══════════════════════════════════════════════
// 全体更新
// ═══════════════════════════════════════════════
function renderAll(){
  renderTrain('down', trainDayState.down);
  renderTrain('up',   trainDayState.up);
  renderBus('go',   busDayState.go);
  renderBus('back', busDayState.back);
}

// ═══════════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════════
(function init(){
  // 各ページのボタン初期状態
  setTrainDay('down', today);
  setTrainDay('up',   today);
  setBusDay('go',   today);
  setBusDay('back', today);
  // タブ
  showTab('down');

  const tick=()=>{ renderAll(); setTimeout(tick, 60000-Date.now()%60000); };
  setTimeout(tick, 60000-Date.now()%60000);
})();
</script>
